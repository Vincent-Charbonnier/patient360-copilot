services:
  backend:
    build: .
    image: vinchar/patient360-copilot:0.1.0
    platform: linux/amd64
    container_name: patient360-backend
    command: ["./scripts/start_backend.sh"]
    ports:
      - "8080:8080"
    environment:
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_SSL_VERIFY: ${LLM_SSL_VERIFY:-true}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_SSL_VERIFY: ${EMBEDDING_SSL_VERIFY:-true}
      CHROMA_MODE: ${CHROMA_MODE:-http}
      CHROMA_HOST: ${CHROMA_HOST:-}
      CHROMA_PORT: ${CHROMA_PORT:-443}
      CHROMA_SSL: ${CHROMA_SSL:-true}
      CHROMA_SSL_VERIFY: ${CHROMA_SSL_VERIFY:-true}
      CHROMA_TENANT: ${CHROMA_TENANT:-default_tenant}
      CHROMA_DATABASE: ${CHROMA_DATABASE:-default_database}
      DATA_PATH: /app/data
      RUNTIME_SETTINGS_PATH: /app/data/config/runtime_settings.json
      LOAD_PERSISTED_RUNTIME_SETTINGS: ${LOAD_PERSISTED_RUNTIME_SETTINGS:-true}
      HF_HOME: /app/data/cache/huggingface
      TRANSFORMERS_CACHE: /app/data/cache/huggingface/transformers
      SENTENCE_TRANSFORMERS_HOME: /app/data/cache/sentence-transformers
      XDG_CACHE_HOME: /app/data/cache
      API_BASE_URL: http://localhost:8080
      ANONYMIZED_TELEMETRY: "False"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    volumes:
      - demo_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 20

  frontend:
    image: vinchar/patient360-copilot:0.1.0
    platform: linux/amd64
    container_name: patient360-frontend
    command: ["./scripts/start_frontend.sh"]
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: http://backend:8080
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  demo_data:
